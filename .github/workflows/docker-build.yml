name: Build and Push PHP Images

on:
  push:
    branches: [main]
    paths:
      - '8.4-fpm/Dockerfile'
      - '8.5-fpm/Dockerfile'
      - '8.4-fpm-alpine/Dockerfile'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.files }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: changed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || git diff --name-only HEAD~1 HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: check_changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: 8.4-fpm/Dockerfile
            image: dommin/php-8.4-fpm

          - dockerfile: 8.4-fpm-alpine/Dockerfile
            image: dommin/php-8.4-fpm-alpine

          - dockerfile: 8.5-fpm/Dockerfile
            image: dommin/php-8.5-fpm

    steps:
      - uses: actions/checkout@v6

      - name: Generate version
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "tag=${DATE}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        if: |
          github.event_name == 'workflow_dispatch' ||
          contains(needs.check_changes.outputs.changed, matrix.dockerfile) ||
          contains(needs.check_changes.outputs.changed, '.github/workflows/docker-build.yml')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64     # multi-arch build
          build-args: |
            USER_ID=1000
            GROUP_ID=1000
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ steps.version.outputs.date }}
            ${{ matrix.image }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
